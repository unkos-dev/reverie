name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan, 17:37 UTC Sunday (~01:37 Monday Perth). Off-peak and
    # avoids top-of-the-hour contention on GitHub-hosted runners.
    - cron: '37 17 * * 0'

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which languages' source actually changed so downstream analyze
  # jobs can skip when their inputs are untouched. Scheduled runs always
  # analyze everything — the path filter is skipped and the analyze jobs
  # fall through the `schedule` branch of their `if:` expressions.
  #
  # Actions analyzer is deliberately NOT path-gated. It runs on every PR
  # to guarantee at least one CodeQL result exists for the commit — the
  # default-branch-protection ruleset requires code scanning results,
  # and a PR that matches none of the path filters (e.g. docs-only or
  # .github/renovate.json-only) would otherwise have zero results and
  # be permanently blocked from merging. Actions analysis is the
  # cheapest of the three (~48s) so the always-on cost is modest.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      javascript-typescript: ${{ steps.filter.outputs.javascript-typescript }}
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        if: github.event_name != 'schedule'
        id: filter
        with:
          filters: |
            javascript-typescript:
              - 'frontend/**'
              - '**/*.html'
              - '.github/workflows/codeql.yml'
              - '.github/codeql/**'
            rust:
              - 'backend/**'
              - '.github/workflows/codeql.yml'
              - '.github/codeql/**'

  analyze-actions:
    name: Analyze (actions)
    # Always runs — guarantees a CodeQL result exists for the commit so
    # the default-branch-protection ruleset's code-scanning rule is
    # satisfied even on PRs that touch no path-gated source.
    runs-on: ubuntu-latest
    permissions:
      # CodeQL needs security-events: write to upload SARIF results.
      security-events: write
      # actions: read lets the Actions extractor fetch referenced workflows.
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: actions
          build-mode: none
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:actions

  analyze-javascript-typescript:
    name: Analyze (javascript-typescript)
    needs: changes
    if: github.event_name == 'schedule' || needs.changes.outputs.javascript-typescript == 'true'
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          build-mode: none
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:javascript-typescript

  analyze-rust:
    name: Analyze (rust)
    needs: changes
    if: github.event_name == 'schedule' || needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: rust
          # All three languages use build-mode: none. The Rust extractor
          # (codeql/rust-queries, beta) currently pins Rust to `none` and
          # rejects `manual`/`autobuild`; the extractor invokes cargo
          # internally. Revisit when upstream exposes manual mode.
          build-mode: none
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:rust
