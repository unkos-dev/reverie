name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan, 17:37 UTC Sunday (~01:37 Monday Perth). Off-peak and
    # avoids top-of-the-hour contention on GitHub-hosted runners.
    - cron: '37 17 * * 0'

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      # CodeQL needs security-events: write to upload SARIF results.
      security-events: write
      # actions: read lets the Actions extractor fetch referenced workflows.
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [actions, javascript-typescript, rust]
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # All three languages use build-mode: none. The Rust extractor
          # (codeql/rust-queries, beta) currently pins Rust to `none` and
          # rejects `manual`/`autobuild`; the extractor invokes cargo
          # internally. Revisit when upstream exposes manual mode.
          build-mode: none
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}
