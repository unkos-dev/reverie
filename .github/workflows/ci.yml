name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: tome
          POSTGRES_PASSWORD: tome
          POSTGRES_DB: tome_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tome -d tome_dev"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://tome_app:tome_app@localhost:5432/tome_dev
    steps:
      - uses: actions/checkout@v4

      - name: Create database roles
        run: psql postgres://tome:tome@localhost:5432/tome_dev -f docker/init-roles.sql
        working-directory: ${{ github.workspace }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Run migrations
        run: >-
          cargo install sqlx-cli --no-default-features --features postgres --locked
          && DATABASE_URL=postgres://tome:tome@localhost:5432/tome_dev sqlx migrate run

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test -- --include-ignored

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - run: cargo install cargo-audit --locked
      - name: Audit dependencies
        run: >-
          cargo audit
          --ignore RUSTSEC-2023-0071
          --ignore RUSTSEC-2026-0097

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
