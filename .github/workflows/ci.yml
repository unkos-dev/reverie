name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which areas of the repo changed so downstream jobs can skip
  # entirely when their inputs are untouched. Documentation-only PRs
  # (CLAUDE.md, README, /plans/, etc.) skip the heavy jobs.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      audit: ${{ steps.filter.outputs.audit }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'docker/init-roles.sql'
              - 'docker-compose.yml'
              - 'Dockerfile'
              - '.github/workflows/ci.yml'
            audit:
              - 'backend/Cargo.toml'
              - 'backend/Cargo.lock'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - 'Dockerfile'
              - '.github/workflows/ci.yml'

  backend:
    name: Backend
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: reverie
          POSTGRES_PASSWORD: reverie
          POSTGRES_DB: reverie_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U reverie -d reverie_dev"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      # `sqlx::test` connects as the schema owner to create per-test databases
      # and run migrations against them; role pools for reverie_app /
      # reverie_ingestion are built per-test in code.
      DATABASE_URL: postgres://reverie:reverie@localhost:5432/reverie_dev
    steps:
      - uses: actions/checkout@v6

      - name: Create database roles
        run: psql postgres://reverie:reverie@localhost:5432/reverie_dev -f docker/init-roles.sql
        working-directory: ${{ github.workspace }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test

  audit:
    name: Security Audit
    needs: changes
    if: needs.changes.outputs.audit == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - run: cargo install cargo-audit --locked
      - name: Audit dependencies
        # Suppressed advisories — each must have a justification:
        #
        # RUSTSEC-2023-0071 — rsa: Marvin Attack (PKCS#1 v1.5 timing sidechannel).
        #   No patched version exists upstream. Reverie uses rsa transitively via
        #   openidconnect for JWT *verification* only — the vulnerable PKCS#1 v1.5
        #   *decryption* path is never invoked.
        #
        # RUSTSEC-2026-0097 — rand: soundness issue (aliased &mut via log+thread_rng).
        #   rand 0.8.x is pulled in transitively by sqlx 0.8; the ecosystem has not
        #   yet released sqlx 0.9 / rand-0.9-compatible versions. Revisit when
        #   sqlx 0.9 goes stable.
        run: cargo audit --ignore RUSTSEC-2023-0071 --ignore RUSTSEC-2026-0097

  frontend:
    name: Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Stylelint
        # Non-blocking in D0 (no .stylelintrc.json yet). D3 task D3.14
        # creates the config and tightens this to a hard gate.
        run: npx stylelint 'src/**/*.css' --max-warnings 0 || true

      - name: Build
        run: npm run build
