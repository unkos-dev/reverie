services:
  postgres:
    image: postgres:17
    container_name: tome-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tome
      POSTGRES_PASSWORD: tome
      POSTGRES_DB: tome_dev
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tome -d tome_dev"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
